name: CI

# 潮汐学习 CI：迁移、静态检查、单测、构建、安全审计与恢复演练。

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:${{ github.workspace }}/ci.db"
      # 构建/运行时占位密钥（生产必须覆盖）。
      SESSION_SECRET: "ci-session-secret-not-for-production"
      PAY_MOCK_SECRET: "ci-mock-secret"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3100"
      NEXT_PUBLIC_APP_URL: "http://localhost:3100"
      NEXT_PUBLIC_PAY_CHANNEL: "mock"
      ALLOW_LOCAL_PRODUCTION: "1"
      STORAGE_MODE: "local"
      STREAM_SIGNING_SECRET: "ci-stream-signing-secret-at-least-32-characters"

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser runtime
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Deploy migrations to an empty database
        run: npm run db:deploy

      - name: Verify migration status and seed
        run: |
          npx prisma migrate status
          npm run db:seed

      - name: Verify upgrade from audited legacy baseline
        run: bash scripts/verify-legacy-migration.sh

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Runtime contracts and critical lifecycle flows
        run: |
          PORT=3100 npm start > "$RUNNER_TEMP/tide-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:3100/api/courses >/dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:3100/api/courses >/dev/null
          CONTRACT_BASE=http://127.0.0.1:3100 npm test -- tests/contract.test.ts
          RUNTIME_BASE=http://127.0.0.1:3100 node scripts/runtime-critical.mjs
          BASE_URL=http://127.0.0.1:3100 QA_OUT="$RUNNER_TEMP/browser-qa" node tests/browser-audit.mjs
          NODE_ENV=production BASE_URL=http://127.0.0.1:3100 node scripts/verify-browser-interactions.mjs

      - name: Backup and restore drill
        run: |
          printf '%s' 'ci-only-backup-password-32-bytes-minimum' > "$RUNNER_TEMP/backup-password"
          REQUIRE_ENCRYPTION=1 BACKUP_ENCRYPTION_PASSWORD_FILE="$RUNNER_TEMP/backup-password" \
            bash scripts/backup-db.sh "$GITHUB_WORKSPACE/ci.db" "$RUNNER_TEMP/backups"
          backup="$(find "$RUNNER_TEMP/backups" -name 'tide-*.db.enc' -type f | head -1)"
          archive="${backup%.db.enc}-uploads.tar.gz.enc"
          test -f "$backup" && test -f "$archive"
          test -z "$(find "$RUNNER_TEMP/backups" -type f ! -name '*.enc' ! -name '*.sha256' -print -quit)"
          BACKUP_ENCRYPTION_PASSWORD_FILE="$RUNNER_TEMP/backup-password" ASSETS_DIR="$RUNNER_TEMP/restored-data" \
            bash scripts/restore-db.sh "$backup" "$RUNNER_TEMP/restored.db" "$archive" --force
          test "$(sqlite3 "$RUNNER_TEMP/restored.db" 'PRAGMA integrity_check;')" = "ok"
          source_media_count="$(find "$GITHUB_WORKSPACE/.data/media" -type f | wc -l)"
          restored_media_count="$(find "$RUNNER_TEMP/restored-data/media" -type f | wc -l)"
          test "$source_media_count" -ge 4
          test "$restored_media_count" = "$source_media_count"
