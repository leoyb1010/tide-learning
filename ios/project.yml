name: YoudaoStudio
options:
  bundleIdPrefix: com.youdao.studio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  YoudaoStudio:
    type: application
    platform: iOS
    sources:
      - path: YoudaoStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youdao.studio.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # 用独立 Info.plist（xcodegen 从 info.properties 生成），
    # 因 ATS 是字典结构，GENERATE_INFOPLIST_FILE 的 INFOPLIST_KEY_ 只支持标量无法表达。
    info:
      path: YoudaoStudio/Info.plist
      properties:
        CFBundleDisplayName: "有道自习室"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "拍照记笔记 / 截取学习画面"
        NSPhotoLibraryUsageDescription: "从相册选择图片附加到笔记"
        # ATS：允许本地/局域网 http 明文连接（联调用 localhost:3100）。
        # 生产走 https 正式域名不受影响；NSAllowsLocalNetworking 只放行本地网络。
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
