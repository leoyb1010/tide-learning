name: YoudaoStudio
options:
  bundleIdPrefix: com.youdao.studio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSCameraUsageDescription: "拍照记笔记 / 截取学习画面"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "从相册选择图片附加到笔记"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  YoudaoStudio:
    type: application
    platform: iOS
    sources:
      - path: YoudaoStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youdao.studio.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "有道自习室"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
